<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina non trovata | Sebastian Marzola</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #06070b;
      color: #e8eaf6;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
      text-align: center;
    }
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(900px 700px at 15% 20%, rgba(60,120,255,0.12), transparent 60%),
        radial-gradient(700px 600px at 85% 70%, rgba(120,60,255,0.10), transparent 60%);
    }
    .content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }
    .code {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(80px, 18vw, 140px);
      line-height: 1;
      background: linear-gradient(180deg, #cfe0ff, #6aa3ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2a4bff, #1e34c8);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid rgba(120,150,255,.45);
      box-shadow: 0 6px 24px rgba(60,90,230,.35), inset 0 1px 0 rgba(255,255,255,.25);
      transition: transform .2s, box-shadow .2s;
    }
    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 32px rgba(60,90,230,.45), inset 0 1px 0 rgba(255,255,255,.25);
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="content">
    <div class="code">404</div>
    <h1>Pagina non trovata</h1>
    <p>La pagina che stai cercando non esiste o è stata spostata.</p>
    <a href="/">← Torna alla home</a>
  </div>
</body>
</html>
